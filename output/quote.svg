<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="Quote: Simplicity is the ultimate sophistication.">
  <style>
    @media (prefers-color-scheme: light) {
      .q-bg { fill: #fafafa; stroke: #e5e7eb; }
      .q-text { fill: #1f2937; }
      .q-author { fill: #6b7280; }
      .q-mark { fill: #d1d5db; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; }
    }
  </style>

  <rect class="q-bg" width="600" height="160" rx="12" fill="#161b22" stroke="#30363d"/>

  <!-- Large quotation mark -->
  <text class="q-mark" x="24" y="55" font-family="Georgia, serif" font-size="60" fill="#21262d" opacity="0.6">
    “
  </text>

  <!-- Quote text -->
  <text class="q-text" x="300" y="75" text-anchor="middle"
        font-family="'Georgia', 'Times New Roman', serif" font-size="18" font-style="italic" fill="#e6edf3">
    Simplicity is the ultimate sophistication.
    <animate attributeName="opacity" from="0" to="1" dur="1s" fill="freeze"/>
  </text>

  <!-- Author -->
  <text class="q-author" x="300" y="110" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" fill="#06b6d4">
    — Leonardo da Vinci
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- Accent line -->
  <rect x="270" y="140" width="60" height="2" rx="1" fill="#06b6d4" opacity="0.5">
    <animate attributeName="width" from="0" to="60" dur="0.8s" begin="0.3s" fill="freeze"/>
    <animate attributeName="x" from="300" to="270" dur="0.8s" begin="0.3s" fill="freeze"/>
  </rect>
</svg>