      <animateMotion dur="4.401308430475183s" begin="1.048115541048901s" repeatCount="indefinite" fill="freeze">
        <mpath href="#cyclePath0"/>
      </animateMotion>
    </circle>
    <path id="cyclePath0" d="M 315,212 L 235,212 L 235,304 L 504,304" fill="none" stroke="none"/>
    <!-- Cycle 1 glow -->
