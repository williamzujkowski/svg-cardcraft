<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="NEXUS AGENTS — tron card">
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
  <defs>
    <linearGradient id="tronSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080400"/>
      <stop offset="60%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#080400"/>
    </linearGradient>
    <filter id="cycleGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="hGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#tronSky)"/>

  <!-- Horizon glow -->
  <rect x="0" y="104" width="900" height="80" fill="url(#hGlow)"/>
  <line x1="0" y1="144" x2="900" y2="144" stroke="#ff6600" stroke-width="1" opacity="0.4"/>

