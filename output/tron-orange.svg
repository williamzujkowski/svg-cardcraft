      <animate attributeName="stroke-dashoffset" from="441" to="0"
               dur="4.401308430475183s" begin="1.048115541048901s" fill="freeze" repeatCount="indefinite"/>
    </path>
    <!-- Cycle 0 core -->
    <path d="M 315,212 L 235,212 L 235,304 L 504,304" fill="none" stroke="#ff6600" stroke-width="2"
          stroke-linecap="round"
          stroke-dasharray="441" stroke-dashoffset="441">
