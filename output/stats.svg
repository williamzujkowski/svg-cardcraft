<svg width="480" height="200" viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="williamzujkowski&apos;s GitHub">
  <style>
    @media (prefers-color-scheme: light) {
      .card-bg { fill: #ffffff; stroke: #d0d7de; }
      .card-title { fill: #1f2328; }
      .card-subtitle { fill: #656d76; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; }
    }
  </style>

  <!-- Card background -->
  <rect class="card-bg" width="480" height="200" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Accent line -->
  <rect x="0" y="0" width="480" height="3" rx="12" fill="#8b5cf6">
    <animate attributeName="width" from="0" to="480" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- Title -->
  <text class="card-title" x="24" y="36" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#e6edf3">
    williamzujkowski&apos;s GitHub
  </text>
  <text class="card-subtitle" x="24" y="54" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e">
    Member since 2015
  </text>

  <!-- Stats grid -->
  
    <g transform="translate(90, 100)">
      <text text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="700" fill="#8b5cf6">
        73
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
      </text>
      <text y="25" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">
        REPOS
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>
      </text>
    </g>
  
    <g transform="translate(210, 100)">
      <text text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="700" fill="#3fb950">
        19
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>
      </text>
      <text y="25" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">
        FOLLOWERS
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s" fill="freeze"/>
      </text>
    </g>
  
    <g transform="translate(330, 100)">
      <text text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="700" fill="#8b949e">
        44
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s" fill="freeze"/>
      </text>
      <text y="25" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">
        FOLLOWING
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.8999999999999999s" fill="freeze"/>
      </text>
    </g>
  
    <g transform="translate(440, 100)">
      <text text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="700" fill="#d29922">
        134
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.9s" fill="freeze"/>
      </text>
      <text y="25" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">
        GISTS
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.1s" fill="freeze"/>
      </text>
    </g>

  <!-- Bottom bar -->
  <line x1="24" y1="176" x2="456" y2="176" stroke="#21262d" stroke-width="1"/>
  <text x="456" y="192" text-anchor="end" font-size="9" fill="#484f58">
    svg-cardcraft
  </text>
</svg>